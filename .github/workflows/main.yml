name: Build Android APK Final

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # لتجنب التنبيهات المتعلقة بتحديثات Node.js في السيرفر
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # استخدام Java 11 لحل مشكلة "Could not determine java version" 
      # لأنها النسخة الأكثر توافقاً مع مشاريع أندرويد المتنوعة
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # بناء محرك Gradle حديث (إصدار 7.5) داخل السيرفر لضمان نجاح البناء
      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew

      # البدء في عملية بناء التطبيق (تحويل الكود إلى APK)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # رفع ملف الـ APK الناتج ليكون جاهزاً للتحميل من تبويب Actions
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-App-Ready
          path: "**/build/outputs/apk/debug/*.apk"
