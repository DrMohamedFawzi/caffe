name: Build Android APK - Final Fix

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Auto-Fix and Build
        run: |
          # 1. تحديد موقع المشروع
          SETTINGS_PATH=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1)
          if [ -z "$SETTINGS_PATH" ]; then echo "Project not found"; exit 1; fi
          PROJECT_ROOT=$(dirname "$SETTINGS_PATH")
          cd "$PROJECT_ROOT"
          echo "✅ Working in: $PROJECT_ROOT"

          # 2. إصلاح المشاكل الشائعة في الملفات القديمة (تبديل jcenter بـ mavenCentral)
          find . -name "*.gradle" -type f -exec sed -i 's/jcenter()/mavenCentral()/g' {} +
          
          # 3. إزالة أي بلوك repositories من settings.gradle لأنه يسبب تعارض في GitHub Actions
          # سنترك فقط التعريفات الأساسية للمشاريع
          sed -i '/repositories {/,/}/d' settings.gradle || true

          # 4. بناء التطبيق باستخدام أحدث نسخة مستقرة
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-Final
          path: "**/build/outputs/apk/debug/*.apk"
