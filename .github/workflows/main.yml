name: Build Android APK - Compatibility Fix

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # استخدام Java 11 لأنها النسخة الوحيدة التي تدعم إصدارات Gradle القديمة
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Locate and Build Project
        run: |
          # البحث عن مكان المشروع
          SETTINGS_PATH=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1)
          
          if [ -z "$SETTINGS_PATH" ]; then
            echo "❌ Error: Could not find any Android project files!"
            exit 1
          fi
          
          PROJECT_ROOT=$(dirname "$SETTINGS_PATH")
          echo "✅ Project found in: $PROJECT_ROOT"
          cd "$PROJECT_ROOT"
          
          # تثبيت نسخة Gradle قديمة (6.7.1) تدعم jcenter()
          gradle wrapper --gradle-version 6.7.1
          chmod +x gradlew
          
          # البدء في البناء
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-App-Classic
          path: "**/build/outputs/apk/debug/*.apk"
