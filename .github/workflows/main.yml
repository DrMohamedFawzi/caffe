name: Build Android APK - Location Fix

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Locate Project and Build
        run: |
          # البحث عن مكان ملف settings.gradle
          SETTINGS_PATH=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1)
          
          if [ -z "$SETTINGS_PATH" ]; then
            echo "❌ Error: Could not find any Android project files in this repository!"
            exit 1
          fi
          
          PROJECT_ROOT=$(dirname "$SETTINGS_PATH")
          echo "✅ Project found in: $PROJECT_ROOT"
          cd "$PROJECT_ROOT"
          
          # إنشاء محرك Gradle والبناء
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-App-Success
          path: "**/build/outputs/apk/debug/*.apk"
