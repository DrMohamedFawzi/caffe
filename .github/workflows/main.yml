name: Build Android APK - Ultimate Fix

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # نستخدم Java 11 لأنها الوحيدة المتوافقة مع jcenter والمشاريع القديمة
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Locate, Install Gradle 6 and Build
        run: |
          # 1. البحث عن مكان المشروع
          SETTINGS_PATH=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1)
          if [ -z "$SETTINGS_PATH" ]; then
            echo "❌ Error: Could not find any Android project files!"
            exit 1
          fi
          PROJECT_ROOT=$(dirname "$SETTINGS_PATH")
          echo "✅ Project found in: $PROJECT_ROOT"
          
          # 2. تحميل وتثبيت Gradle 6.7.1 يدوياً
          wget -q https://services.gradle.org/distributions/gradle-6.7.1-bin.zip -P /tmp
          unzip -q -d /tmp /tmp/gradle-6.7.1-bin.zip
          
          # 3. استخدام المسار المطلق لـ Gradle القديم للبناء مباشرة
          # هذا يضمن عدم استخدام Gradle 9 الموجود على السيرفر
          cd "$PROJECT_ROOT"
          /tmp/gradle-6.7.1/bin/gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-App-Success
          path: "**/build/outputs/apk/debug/*.apk"
