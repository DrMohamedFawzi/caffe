name: Build Android APK - Final Legacy Fix

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # نستخدم Java 11 لأنها الأنسب لإصدارات Gradle 7 وما قبلها
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Auto-Fix and Build
        run: |
          # 1. تحديد موقع المشروع
          SETTINGS_PATH=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1)
          if [ -z "$SETTINGS_PATH" ]; then echo "Project not found"; exit 1; fi
          PROJECT_ROOT=$(dirname "$SETTINGS_PATH")
          cd "$PROJECT_ROOT"
          echo "✅ Working in: $PROJECT_ROOT"

          # 2. إصلاح المستودعات (jcenter تعطلت رسمياً)
          find . -name "*.gradle" -type f -exec sed -i 's/jcenter()/mavenCentral()/g' {} +
          
          # 3. حذف أي إعدادات تعارض في settings.gradle
          sed -i '/repositories {/,/}/d' settings.gradle || true

          # 4. استخدام Gradle 7.4 (الإصدار الذهبي للمشاريع القديمة لتجنب خطأ ConfigurationTime)
          # سنقوم بتحميله واستخدامه مباشرة لتجنب تداخل Gradle 9
          wget -q https://services.gradle.org/distributions/gradle-7.4-bin.zip -P /tmp
          unzip -q -d /tmp /tmp/gradle-7.4-bin.zip
          
          # 5. تشغيل البناء باستخدام المسار المطلق
          /tmp/gradle-7.4/bin/gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-Final
          path: "**/build/outputs/apk/debug/*.apk"
