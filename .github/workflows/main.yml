name: Build Android APK - Final Compatibility

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # نستخدم Java 17 لأن السيرفر يطلبها لتشغيل Gradle في البداية
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Locate and Build Project
        run: |
          # 1. البحث عن مكان المشروع
          SETTINGS_PATH=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1)
          
          if [ -z "$SETTINGS_PATH" ]; then
            echo "❌ Error: Could not find any Android project files!"
            exit 1
          fi
          
          PROJECT_ROOT=$(dirname "$SETTINGS_PATH")
          echo "✅ Project found in: $PROJECT_ROOT"
          cd "$PROJECT_ROOT"
          
          # 2. تحميل نسخة Gradle 6.7.1 يدوياً لضمان التوافق مع jcenter
          wget https://services.gradle.org/distributions/gradle-6.7.1-bin.zip -P /tmp
          unzip -d /tmp /tmp/gradle-6.7.1-bin.zip
          export PATH=$PATH:/tmp/gradle-6.7.1/bin
          
          # 3. توليد الـ Wrapper وتغيير نسخة الجافا للعملية فقط
          gradle wrapper --gradle-version 6.7.1
          chmod +x gradlew
          
          # 4. تشغيل البناء باستخدام Java 11 (سنقوم بتغييرها هنا فقط للتشغيل)
          export JAVA_HOME=$JAVA_HOME_11_X64
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-App-Fixed
          path: "**/build/outputs/apk/debug/*.apk"
